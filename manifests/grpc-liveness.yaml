apiVersion: v1
kind: Pod

metadata:
  name: grpc-liveness

spec:
  containers:
  - name: etcd
    image: registry.k8s.io/etcd:3.5.1-0

    command:
    - /usr/local/bin/etcd

    args:
    - --data-dir=/var/lib/etcd
    - --listen-client-urls=http://0.0.0.0:2379
    - --advertise-client-urls=http://127.0.0.1:2379

    ports:
    - containerPort: 2379

    livenessProbe:
      grpc:
        port: 2379

      initialDelaySeconds: 10
