apiVersion: v1
kind: Pod

metadata:
  name: startup-probe-example

spec:
  containers:
  - name: slow-start-app
    image: registry.k8s.io/e2e-test-images/agnhost:2.40

    args:
    - liveness

    ports:
    - containerPort: 8080

    startupProbe:
      httpGet:
        path: /healthz
        port: 8080

      failureThreshold: 30
      periodSeconds: 10

    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080

      initialDelaySeconds: 3
      periodSeconds: 3
