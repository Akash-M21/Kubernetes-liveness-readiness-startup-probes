apiVersion: v1
kind: Pod

metadata:
  name: liveness-http

spec:
  containers:
  - name: liveness
    image: registry.k8s.io/e2e-test-images/agnhost:2.40

    args:
    - liveness

    ports:
    - containerPort: 8080

    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080

      initialDelaySeconds: 3
      periodSeconds: 3
