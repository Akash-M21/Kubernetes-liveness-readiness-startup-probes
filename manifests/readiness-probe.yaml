apiVersion: v1
kind: Pod

metadata:
  name: readiness-probe-example

spec:
  containers:
  - name: readiness
    image: registry.k8s.io/e2e-test-images/agnhost:2.40

    args:
    - netexec
    - --http-port=8080

    ports:
    - containerPort: 8080

    readinessProbe:
      httpGet:
        path: /
        port: 8080

      initialDelaySeconds: 5
      periodSeconds: 5
